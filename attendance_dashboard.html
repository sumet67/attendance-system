<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0a0b10; color: white; }
        .cyber-panel { background: rgba(16, 18, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .status-pill { padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 cyber-font">ATTENDANCE PRO</h1>
                <p class="text-gray-400 text-sm">ระบบควบคุมเวลาเข้า-ออก (1 ครั้งต่อวัน)</p>
            </div>
            <div class="flex gap-2">
                <div class="bg-gray-900/50 p-2 px-4 rounded-lg border border-gray-800 text-[10px] text-gray-400">
                    <span class="text-cyan-400 block cyber-font">Allowed Check-In</span>
                    06:00 - 10:00
                </div>
                <div class="bg-gray-900/50 p-2 px-4 rounded-lg border border-gray-800 text-[10px] text-gray-400">
                    <span class="text-orange-400 block cyber-font">Allowed Check-Out</span>
                    15:00 - 22:00
                </div>
                <button onclick="fetchData()" class="px-6 py-2 bg-cyan-600/20 border border-cyan-500 text-cyan-400 rounded-lg hover:bg-cyan-600/40 transition self-end">
                    REFRESH
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="cyber-panel p-5 rounded-2xl border-b-2 border-b-cyan-500">
                <p class="text-gray-500 text-xs uppercase cyber-font">Total Active Employees</p>
                <h2 id="totalActive" class="text-4xl font-bold text-white mt-1">0</h2>
            </div>
            <div class="cyber-panel p-5 rounded-2xl border-b-2 border-b-green-500">
                <p class="text-gray-500 text-xs uppercase cyber-font">Completed (In/Out)</p>
                <h2 id="completedCount" class="text-4xl font-bold text-green-400 mt-1">0</h2>
            </div>
            <div class="cyber-panel p-5 rounded-2xl border-b-2 border-b-yellow-500">
                <p class="text-gray-500 text-xs uppercase cyber-font">Currently Working</p>
                <h2 id="workingCount" class="text-4xl font-bold text-yellow-400 mt-1">0</h2>
            </div>
        </div>

        <div class="cyber-panel rounded-2xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-cyan-900/20 text-cyan-400 text-xs uppercase cyber-font">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Employee ID</th>
                            <th class="p-4">Full Name</th>
                            <th class="p-4">Time In</th>
                            <th class="p-4">Time Out</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-gray-800">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
            <div id="loading" class="p-12 text-center text-gray-500">
                <div class="animate-spin w-6 h-6 border-2 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <span class="cyber-font text-[10px]">Syncing with Google Sheets...</span>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6aga7-pCJRAQNLjTm1exJXy4ebLiyTKidz2lFbpRNUxDQTPdfffmPawlUHCKtln5N0Q/exec"; 

        async function fetchData() {
            if (SCRIPT_URL.includes("XXXXXXXXXXXX")) return;
            document.getElementById('loading').style.display = 'block';
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            try {
                const response = await fetch(`${SCRIPT_URL}?action=read`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                let working = 0;
                let completed = 0;
                let uniqueIds = new Set();
                const today = new Date().toLocaleDateString('th-TH');

                data.reverse().forEach(row => {
                    uniqueIds.add(row.id);
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5 transition border-l-2 border-transparent hover:border-cyan-500";
                    
                    const isToday = row.date === today;
                    if (isToday) {
                        if (row.status === "Completed") completed++;
                        else working++;
                    }

                    tr.innerHTML = `
                        <td class="p-4 text-gray-500">${row.date}</td>
                        <td class="p-4 text-cyan-400 font-mono font-bold">${row.id}</td>
                        <td class="p-4 font-medium">${row.fullName}</td>
                        <td class="p-4 text-green-400">${row.checkIn}</td>
                        <td class="p-4 ${row.checkOut === '-' ? 'text-gray-700 italic' : 'text-orange-400'}">
                            ${row.checkOut === '-' ? 'Waiting...' : row.checkOut}
                        </td>
                        <td class="p-4 text-center">
                            <span class="status-pill ${
                                row.status === 'Completed' ? 'bg-green-500/10 text-green-500 border border-green-500/20' : 'bg-yellow-500/10 text-yellow-500 border border-yellow-500/20'
                            }">
                                ${row.status}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('totalActive').innerText = uniqueIds.size;
                document.getElementById('completedCount').innerText = completed;
                document.getElementById('workingCount').innerText = working;

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading').innerText = "CONNECTION ERROR";
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
