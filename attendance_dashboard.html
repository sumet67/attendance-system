<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0a0b10; color: white; }
        .cyber-panel { background: rgba(16, 18, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 cyber-font">DASHBOARD</h1>
                <p class="text-gray-400 text-sm">ระบบสรุปเวลาเข้า-ออกงาน (Real-time Cloud Sync)</p>
            </div>
            <button onclick="fetchData()" class="px-6 py-2 bg-cyan-600/20 border border-cyan-500 text-cyan-400 rounded-lg hover:bg-cyan-600/40 transition">
                REFRESH DATA
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="cyber-panel p-5 rounded-2xl">
                <p class="text-gray-400 text-xs uppercase cyber-font">Total Records</p>
                <h2 id="totalCount" class="text-4xl font-bold text-white mt-1">0</h2>
            </div>
            <div class="cyber-panel p-5 rounded-2xl border-l-4 border-l-green-500">
                <p class="text-gray-400 text-xs uppercase cyber-font">Completed Today</p>
                <h2 id="todayCount" class="text-4xl font-bold text-green-400 mt-1">0</h2>
            </div>
            <div class="cyber-panel p-5 rounded-2xl border-l-4 border-l-yellow-500">
                <p class="text-gray-400 text-xs uppercase cyber-font">Still Working</p>
                <h2 id="workingCount" class="text-4xl font-bold text-yellow-400 mt-1">0</h2>
            </div>
        </div>

        <div class="cyber-panel rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-cyan-900/30 text-cyan-400 text-xs uppercase cyber-font">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">ID</th>
                        <th class="p-4">Full Name</th>
                        <th class="p-4">Check-In</th>
                        <th class="p-4">Check-Out</th>
                        <th class="p-4 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y divide-gray-800">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <div id="loading" class="p-10 text-center text-gray-500">
                <div class="animate-spin w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full mx-auto mb-2"></div>
                กำลังดึงข้อมูลจาก Cloud...
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkATZh2KiV1u7A8d2VBgkTRmFd_S0K6A3U5m7KFrKidMlmp2wkYalK1Bza5-QfLkTlEw/exec"; 

        async function fetchData() {
            if (SCRIPT_URL.includes("XXXXXXXXXXXX")) {
                alert("กรุณาตั้งค่า SCRIPT_URL ในโค้ดก่อนครับ");
                return;
            }

            document.getElementById('loading').style.display = 'block';
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            try {
                const response = await fetch(`${SCRIPT_URL}?action=read`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('totalCount').innerText = data.length;
                
                let todayDone = 0;
                let working = 0;
                const today = new Date().toLocaleDateString('th-TH');

                data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5 transition";
                    
                    const isToday = row.date === today;
                    if (isToday) {
                        if (row.status === "Completed") todayDone++;
                        else working++;
                    }

                    tr.innerHTML = `
                        <td class="p-4 text-gray-400">${row.date}</td>
                        <td class="p-4 font-mono text-cyan-400">${row.id}</td>
                        <td class="p-4 font-semibold">${row.fullName}</td>
                        <td class="p-4 text-green-400">${row.checkIn}</td>
                        <td class="p-4 ${row.checkOut === '-' ? 'text-gray-600' : 'text-orange-400'}">${row.checkOut}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${
                                row.status === 'Completed' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'
                            }">
                                ${row.status}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('todayCount').innerText = todayDone;
                document.getElementById('workingCount').innerText = working;

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading').innerText = "เกิดข้อผิดพลาดในการดึงข้อมูล";
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
