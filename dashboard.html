<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Attendance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-pill {
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-6 bg-[#0a0b10] text-white">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 cyber-font">DASHBOARD</h1>
                <p class="text-gray-400 text-sm font-light">ระบบติดตามการเข้า-ออกงานแบบเรียลไทม์</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="nav-btn text-[11px]">BACK TO SCANNER</a>
                <button onclick="loadData()" class="px-6 py-2 bg-cyan-600/20 border border-cyan-500 text-cyan-400 rounded-lg hover:bg-cyan-600/40 transition cyber-font text-xs">REFRESH</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass p-6 rounded-2xl border-b-2 border-cyan-500 bg-white/5">
                <p class="text-gray-500 text-[10px] uppercase cyber-font">พนักงานทั้งหมด</p>
                <h2 id="countTotal" class="text-4xl font-bold mt-1 tracking-tighter">0</h2>
            </div>
            <div class="glass p-6 rounded-2xl border-b-2 border-green-500 bg-white/5">
                <p class="text-gray-500 text-[10px] uppercase cyber-font">สแกนครบแล้ว (In/Out)</p>
                <h2 id="countDone" class="text-4xl font-bold text-green-400 mt-1 tracking-tighter">0</h2>
            </div>
            <div class="glass p-6 rounded-2xl border-b-2 border-yellow-500 bg-white/5">
                <p class="text-gray-500 text-[10px] uppercase cyber-font">กำลังปฏิบัติงาน</p>
                <h2 id="countActive" class="text-4xl font-bold text-yellow-400 mt-1 tracking-tighter">0</h2>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-cyan-900/20 text-cyan-400 text-[10px] uppercase cyber-font">
                        <tr>
                            <th class="p-4">วันที่</th>
                            <th class="p-4">ID พนักงาน</th>
                            <th class="p-4">ชื่อ-นามสกุล</th>
                            <th class="p-4">เวลาเข้า</th>
                            <th class="p-4">เวลาออก</th>
                            <th class="p-4 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-white/5">
                        <!-- ข้อมูลจะถูกเติมที่นี่ -->
                    </tbody>
                </table>
            </div>
            <div id="loader" class="p-16 text-center text-gray-500">
                <div class="animate-spin w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="cyber-font text-[10px] tracking-widest animate-pulse">Synchronizing Data...</p>
            </div>
            <div id="error-msg" class="hidden p-8 text-center text-red-400 cyber-font text-xs uppercase">
                ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบ SCRIPT_URL
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
