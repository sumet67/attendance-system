<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Recognition - No ID Required</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0b10; --success: #00ff88; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .scanner-box { position: relative; width: 320px; height: 420px; border-radius: 40px; overflow: hidden; border: 2px solid rgba(0, 242, 255, 0.3); background: #000; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }
        video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scaleX(-1); min-width: 100%; min-height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); z-index: 10; animation: scan 3s infinite; }
        @keyframes scan { 0%, 100% { top: 10%; opacity: 0; } 50% { top: 90%; opacity: 1; } }
        .face-frame { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 280px; border: 2px dashed rgba(0, 242, 255, 0.2); border-radius: 50%; z-index: 5; }
        .detected { border-color: var(--success); border-style: solid; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .glass { background: rgba(16, 18, 27, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        #registration-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        
        /* สไตล์ปุ่มกดที่ดูทันสมัย */
        .btn-primary { background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 198, 255, 0.4); }
    </style>
</head>
<body>

    <div class="max-w-md w-full flex flex-col items-center gap-6 p-4">
        <div class="text-center">
            <h1 class="text-2xl font-bold cyber-font text-cyan-400">AI IDENTITY</h1>
            <p id="aiStatus" class="text-[9px] text-gray-500 cyber-font">CORE LOADING...</p>
        </div>

        <div class="scanner-box">
            <video id="video" autoplay playsinline muted></video>
            <div id="scanLine" class="scan-line" style="display:none"></div>
            <div id="faceFrame" class="face-frame"></div>
            <div id="successOverlay" class="absolute inset-0 bg-green-500/20 hidden z-10"></div>
            
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[85%] glass p-4 z-20">
                <div class="flex flex-col gap-1">
                    <span id="displayName" class="text-cyan-400 font-bold truncate text-sm uppercase">Waiting for Face...</span>
                    <span id="displayID" class="text-[8px] text-gray-500 uppercase">Status: Offline</span>
                    <div class="w-full bg-gray-900 h-1 rounded-full mt-2 overflow-hidden">
                        <div id="progressBar" class="bg-cyan-400 h-full w-0 transition-all duration-200"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full flex flex-col gap-3">
            <div class="glass p-4 flex items-center gap-3 border-l-4 border-cyan-500">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <span id="statusText" class="text-xs font-bold uppercase text-yellow-500">Scanning Area...</span>
            </div>
            <button onclick="openReg()" class="w-full py-4 bg-cyan-500/10 border border-cyan-500/30 rounded-2xl text-xs font-bold hover:bg-cyan-500/20 transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                ลงทะเบียนสมาชิกใหม่
            </button>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registration-modal">
        <div class="glass p-8 w-full max-w-sm space-y-6 shadow-2xl border-t-2 border-cyan-500">
            <div class="text-center space-y-2">
                <h3 class="cyber-font text-cyan-400 text-sm">MEMBER ENROLLMENT</h3>
                <p class="text-[10px] text-gray-400">ระบุชื่อเพื่อบันทึกข้อมูลใบหน้าลงระบบ Cloud</p>
            </div>
            
            <div id="regForm" class="space-y-4">
                <div class="space-y-3">
                    <input type="text" id="regFName" class="w-full bg-white/5 border border-cyan-500/20 p-4 rounded-xl text-sm focus:border-cyan-500 outline-none" placeholder="ชื่อจริง">
                    <input type="text" id="regLName" class="w-full bg-white/5 border border-cyan-500/20 p-4 rounded-xl text-sm focus:border-cyan-500 outline-none" placeholder="นามสกุล">
                    <input type="text" id="regRole" class="w-full bg-white/5 border border-cyan-500/20 p-4 rounded-xl text-sm focus:border-cyan-500 outline-none" placeholder="ตำแหน่ง (ถ้ามี)">
                </div>
                
                <div class="flex gap-2 pt-2">
                    <button onclick="closeReg()" class="flex-1 py-4 bg-gray-800 rounded-xl text-xs font-bold hover:bg-gray-700">ยกเลิก</button>
                    <button onclick="saveMember()" id="btnSave" class="flex-1 py-4 btn-primary rounded-xl text-xs font-bold text-white uppercase">เริ่มบันทึกใบหน้า</button>
                </div>
            </div>

            <div id="regProgress" class="hidden text-center space-y-4 py-4">
                <div class="relative w-24 h-24 mx-auto">
                    <div class="absolute inset-0 border-4 border-cyan-500/20 rounded-full"></div>
                    <div id="regCircle" class="absolute inset-0 border-4 border-cyan-500 rounded-full border-t-transparent animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span id="regPercentText" class="text-xs font-bold text-cyan-400">0%</span>
                    </div>
                </div>
                <p id="regText" class="text-[11px] font-bold text-cyan-400 uppercase">Analyzing facial features...</p>
                <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                    <div id="regBar" class="bg-cyan-400 h-full w-0 transition-all"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ใส่ URL ที่ได้จาก Google Apps Script Deployment
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6aga7-pCJRAQNLjTm1exJXy4ebLiyTKidz2lFbpRNUxDQTPdfffmPawlUHCKtln5N0Q/exec"; 
        
        const video = document.getElementById('video');
        const faceFrame = document.getElementById('faceFrame');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const displayName = document.getElementById('displayName');
        const displayID = document.getElementById('displayID');

        let faceMatcher = null;
        let isModelLoaded = false;
        let isProcessing = false;
        let isPaused = false;
        let scanValue = 0;

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                isModelLoaded = true;
                document.getElementById('aiStatus').innerText = "AI IDENTITY ACTIVE";
                loadFaceDatabase();
                startCamera();
            } catch (e) { 
                console.error(e);
                document.getElementById('aiStatus').innerText = "ERROR LOADING MODELS";
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => detectLoop();
            } catch (e) {
                alert("กรุณาเข้าถึงกล้องเพื่อใช้งานระบบสแกนใบหน้า");
            }
        }

        async function loadFaceDatabase() {
            if (SCRIPT_URL.includes("XXXX")) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_face_database`);
                const data = await res.json();
                if (data.length > 0) {
                    const labeledDescriptors = data.map(m => {
                        try {
                            const descArr = JSON.parse(m.faceData);
                            const desc = new Float32Array(descArr);
                            return new faceapi.LabeledFaceDescriptors(`${m.id}|${m.firstName} ${m.lastName}`, [desc]);
                        } catch (err) { return null; }
                    }).filter(x => x !== null);
                    
                    if (labeledDescriptors.length > 0) {
                        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45); // ปรับค่า Threshold (ยิ่งน้อยยิ่งเข้มงวด)
                        console.log("Database Sync Complete");
                    }
                }
            } catch (e) { console.log("Database Sync Failed"); }
        }

        async function detectLoop() {
            setInterval(async () => {
                if (isProcessing || isPaused || !isModelLoaded) return;

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    faceFrame.classList.add('detected');
                    
                    if (faceMatcher) {
                        const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                        if (bestMatch.label !== 'unknown') {
                            const [id, name] = bestMatch.label.split('|');
                            displayName.innerText = name;
                            displayID.innerText = `ID: ${id}`;
                            statusText.innerText = "Verified: " + name;
                            statusDot.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
                            
                            scanValue += 10;
                            if (scanValue >= 100) await recordAttendance(id, name);
                        } else {
                            displayName.innerText = "Unknown Person";
                            displayID.innerText = "System: Unauthorized";
                            statusText.innerText = "Searching Database...";
                            statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                            scanValue = 0;
                        }
                    }
                } else {
                    faceFrame.classList.remove('detected');
                    statusText.innerText = "Searching Area...";
                    statusDot.className = "w-3 h-3 rounded-full bg-yellow-500";
                    scanValue = Math.max(0, scanValue - 5);
                }
                progressBar.style.width = scanValue + "%";
            }, 200);
        }

        async function recordAttendance(id, fullName) {
            isProcessing = true;
            const [f, l] = fullName.split(' ');
            const payload = { action: "attendance", id, firstName: f, lastName: l };
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('successOverlay').classList.remove('hidden');
                statusText.innerText = "Log Saved to Cloud";
                setTimeout(() => {
                    document.getElementById('successOverlay').classList.add('hidden');
                    scanValue = 0;
                    isProcessing = false;
                }, 2500);
            } catch (e) { isProcessing = false; }
        }

        function openReg() { isPaused = true; document.getElementById('registration-modal').style.display = 'flex'; }
        function closeReg() { isPaused = false; document.getElementById('registration-modal').style.display = 'none'; }

        async function saveMember() {
            const f = document.getElementById('regFName').value.trim();
            const l = document.getElementById('regLName').value.trim();
            const r = document.getElementById('regRole').value.trim();
            
            if (!f || !l) return alert("กรุณาระบุชื่อและนามสกุลจริง");

            document.getElementById('regForm').classList.add('hidden');
            document.getElementById('regProgress').classList.remove('hidden');

            let count = 0;
            let capturedDescriptor = null;

            const scanInterval = setInterval(async () => {
                const d = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks().withFaceDescriptor();
                
                if (d) {
                    count += 20;
                    document.getElementById('regBar').style.width = count + "%";
                    document.getElementById('regPercentText').innerText = count + "%";
                    capturedDescriptor = d.descriptor;
                }

                if (count >= 100) {
                    clearInterval(scanInterval);
                    // สร้าง ID อัตโนมัติ: วันที่ + สุ่ม 4 หลัก
                    const generatedId = "UID-" + Date.now().toString().slice(-4) + Math.floor(1000 + Math.random() * 9000).toString().slice(-2);
                    
                    const payload = {
                        action: "register",
                        id: generatedId,
                        firstName: f,
                        lastName: l,
                        role: r || "Member",
                        faceData: JSON.stringify(Array.from(capturedDescriptor))
                    };

                    try {
                        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert(`ลงทะเบียนสำเร็จ!\nID ของคุณคือ: ${generatedId}`);
                        location.reload(); // รีโหลดเพื่ออัปเดตฐานข้อมูลหน้าใบหน้า
                    } catch (e) { 
                        alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
                        location.reload();
                    }
                }
            }, 400);
        }

        window.onload = init;
    </script>
</body>
</html>
