<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Scanner Pro - Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2ff;
            --bg-dark: #0a0b10;
            --success-color: #00ff88;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .scanner-container {
            position: relative;
            width: 320px;
            height: 420px;
            border-radius: 40px;
            overflow: hidden;
            border: 2px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            background: #000;
        }

        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%) scaleX(-1);
            object-fit: cover;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            z-index: 10;
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 10%; opacity: 0; }
            50% { top: 90%; opacity: 1; }
        }

        .face-frame {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 260px;
            border: 2px dashed rgba(0, 242, 255, 0.3);
            border-radius: 50% 50% 45% 45%;
            z-index: 5;
            transition: all 0.3s;
        }

        .face-frame.detected {
            border-color: var(--success-color);
            border-style: solid;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .glass-panel {
            background: rgba(16, 18, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 8px 16px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 10px;
            color: #00f2ff;
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reg-button {
            background: linear-gradient(90deg, rgba(0,242,255,0.1), rgba(0,242,255,0.05));
            border: 1px solid rgba(0,242,255,0.3);
            transition: all 0.3s;
        }

        .reg-button:hover {
            background: rgba(0,242,255,0.2);
            border-color: var(--primary-color);
        }

        #registration-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: white;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .success-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 255, 136, 0.2);
            display: none;
            z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4">

    <!-- Control Buttons -->
    <div class="fixed top-5 right-5 flex gap-2 z-50">
        <a href="attendance_dashboard.html" class="admin-btn !relative !top-0 !right-0 border-cyan-400/50 hover:bg-cyan-400/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            DASHBOARD (CLOUD)
        </a>
    </div>

    <div class="max-w-md w-full flex flex-col items-center gap-4">
        
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-bold cyber-font text-cyan-400">FAST SCAN</h1>
            <p id="aiStatus" class="text-gray-500 text-[9px] cyber-font uppercase">Loading Systems...</p>
        </div>

        <!-- Scanner View -->
        <div class="scanner-container">
            <video id="video" autoplay playsinline muted></video>
            <div id="scanLine" class="scan-line" style="display: none;"></div>
            <div id="faceFrame" class="face-frame"></div>
            <div id="successOverlay" class="success-overlay"></div>
            
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[85%] glass-panel p-3 text-[10px] cyber-font z-20">
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span id="displayUser" class="text-cyan-400 font-bold truncate max-w-[120px]">READY TO SCAN</span>
                            <span id="displayRole" class="text-[8px] text-gray-400 uppercase">Wait for Identity</span>
                        </div>
                        <span id="scanPercent" class="text-cyan-400">0%</span>
                    </div>
                    <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden mt-1">
                        <div id="progressBar" class="bg-cyan-400 h-full w-0 transition-all duration-100"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full space-y-3">
            <div class="glass-panel p-4 flex items-center justify-between border-l-4 border-l-cyan-500">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                    <span id="statusText" class="text-[11px] text-yellow-500 uppercase font-bold">Scanning...</span>
                </div>
            </div>

            <button type="button" onclick="openRegistration()" class="w-full py-3 reg-button rounded-xl flex items-center justify-center gap-2 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-cyan-400 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                <span class="text-xs font-bold text-gray-300">ลงทะเบียนพนักงานใหม่ (Register)</span>
            </button>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registration-modal">
        <div class="glass-panel p-8 w-full max-w-sm space-y-5 border-t-2 border-cyan-500 shadow-2xl">
            <h3 class="cyber-font text-sm text-cyan-400 text-center uppercase">New Registration</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 uppercase mb-1 block">Full Name</label>
                    <input type="text" id="regName" class="input-field" placeholder="ชื่อ - นามสกุล">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase mb-1 block">Role / Position</label>
                    <select id="regRole" class="input-field">
                        <option value="Executive">ผู้บริหาร</option>
                        <option value="Teacher">ครู / อาจารย์</option>
                        <option value="Officer">เจ้าหน้าที่</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeRegistration()" class="flex-1 py-3 bg-gray-800 rounded-xl text-xs font-bold text-gray-300">CANCEL</button>
                    <button type="button" onclick="saveRegistration()" class="flex-1 py-3 bg-cyan-600 rounded-xl text-xs font-bold text-white shadow-lg shadow-cyan-500/20">CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- เปลี่ยน SCRIPT_URL เป็นของคุณ ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxw-VLlXQtdmhZ46X3AeSZbXX_SDKTbay2VJeO6nM5xS7LPfWcsLZpQ0fOwzvCsA2o9QA/exec"; 
        
        const video = document.getElementById('video');
        const faceFrame = document.getElementById('faceFrame');
        const aiStatus = document.getElementById('aiStatus');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const progressBar = document.getElementById('progressBar');
        const scanPercent = document.getElementById('scanPercent');
        const displayUser = document.getElementById('displayUser');
        const displayRole = document.getElementById('displayRole');
        const scanLine = document.getElementById('scanLine');
        const successOverlay = document.getElementById('successOverlay');

        let isModelLoaded = false;
        let isProcessing = false;
        let isPaused = false; 
        let scanValue = 0;
        let currentUser = null; 

        async function init() {
            try {
                // ใช้ CDN สำหรับโหลด Model
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                isModelLoaded = true;
                aiStatus.innerText = "SYSTEMS ONLINE";
                aiStatus.classList.add('text-green-400');
                startCamera();
            } catch (e) {
                aiStatus.innerText = "MODEL ERROR";
                console.error(e);
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => startFaceDetection();
            } catch (err) {
                alert("กรุณาอนุญาตกล้อง (Camera Permission Required)");
            }
        }

        function startFaceDetection() {
            setInterval(async () => {
                if (isProcessing || isPaused) return;
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                if (detections.length > 0) {
                    if (!currentUser) {
                        statusText.innerText = "NOT REGISTERED";
                        statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
                        return;
                    }
                    onFaceFound();
                } else {
                    onFaceLost();
                }
            }, 100);
        }

        function onFaceFound() {
            faceFrame.classList.add('detected');
            scanLine.style.display = 'block';
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse";
            statusText.innerText = "AUTHENTICATING...";
            if (scanValue < 100) {
                scanValue += 5;
                progressBar.style.width = `${scanValue}%`;
                scanPercent.innerText = `${scanValue}%`;
                if (scanValue >= 100) handleCheckIn();
            }
        }

        function onFaceLost() {
            faceFrame.classList.remove('detected');
            scanLine.style.display = 'none';
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500";
            statusText.innerText = currentUser ? "WAITING FOR FACE..." : "PLEASE REGISTER";
            if (scanValue > 0) {
                scanValue -= 2;
                progressBar.style.width = `${scanValue}%`;
                scanPercent.innerText = `${Math.max(0, scanValue)}%`;
            }
        }

        async function handleCheckIn() {
            if (isProcessing) return;
            isProcessing = true;
            statusText.innerText = "SYNCING CLOUD...";
            successOverlay.style.display = 'block';

            const payload = {
                timestamp: new Date().toLocaleString('th-TH'),
                fullName: currentUser.name,
                employeeId: currentUser.role,
                status: "Success"
            };

            // บันทึกลง Local Cache
            let history = JSON.parse(localStorage.getItem('faceScanHistory') || '[]');
            history.push(payload);
            localStorage.setItem('faceScanHistory', JSON.stringify(history));

            // ส่งไปยัง Google Sheets
            if (SCRIPT_URL && !SCRIPT_URL.includes("XXXXXXXXXXXX")) {
                try {
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload) 
                    });
                } catch (e) { console.error("Cloud Sync Error:", e); }
            }

            setTimeout(() => {
                statusText.innerText = "CHECK-IN SUCCESSFUL";
                setTimeout(() => {
                    isProcessing = false;
                    scanValue = 0;
                    progressBar.style.width = '0%';
                    scanPercent.innerText = '0%';
                    successOverlay.style.display = 'none';
                }, 2000);
            }, 800);
        }

        function openRegistration() {
            isPaused = true;
            document.getElementById('registration-modal').style.display = 'flex';
        }

        function closeRegistration() {
            isPaused = false;
            document.getElementById('registration-modal').style.display = 'none';
        }

        function saveRegistration() {
            const name = document.getElementById('regName').value.trim();
            const roleSelect = document.getElementById('regRole');
            const role = roleSelect.options[roleSelect.selectedIndex].text;
            
            if (!name) {
                alert("กรุณากรอกชื่อ-นามสกุล");
                return;
            }
            
            currentUser = { name: name, role: role };
            displayUser.innerText = name;
            displayRole.innerText = role;
            closeRegistration();
        }

        window.onload = init;
    </script>
</body>
</html>
