<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI Scanner</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="scanner-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<div class="fixed bottom-10 text-center">
    <p id="aiStatus">Loading...</p>
    <p id="statusText" class="text-yellow-400">Scanning...</p>
</div>

<script src="scanner.js"></script>
</body>
</html>
