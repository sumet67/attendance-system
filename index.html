<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Face Scan</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-blue-600 text-white p-4 text-center">
        <h1 class="text-lg font-semibold">สแกนใบหน้า</h1>
        <p id="aiStatus" class="text-xs opacity-80">กำลังโหลดระบบ...</p>
    </div>

    <!-- CAMERA -->
    <div class="relative">
        <video id="video" autoplay muted playsinline class="w-full h-[380px] object-cover"></video>
        <canvas id="overlay"></canvas>

        <!-- Frame -->
        <div class="face-frame"></div>
    </div>

    <!-- STATUS -->
    <div class="p-4 text-center">
        <p id="statusText" class="text-yellow-500 font-medium">กำลังสแกน...</p>

        <div class="mt-3 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div id="progressBar" class="h-2 bg-blue-500 w-1/3 animate-pulse"></div>
        </div>
    </div>

    <!-- BUTTON -->
    <div class="p-4">
        <button onclick="registerFace(prompt('ชื่อพนักงาน'))"
            class="w-full py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition">
            ลงทะเบียนพนักงาน
        </button>
    </div>

</div>

<script src="scanner.js"></script>
</body>
</html>
