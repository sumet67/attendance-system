<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Scanner Pro - Fast Entry</title>
    <!-- เรียกใช้ Tailwind CSS และ Face API -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <!-- เชื่อมต่อไฟล์ CSS ที่แยกออกมา -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 bg-[#0a0b10] text-white overflow-hidden h-screen flex items-center justify-center">

    <!-- ปุ่มทางลัดไปหน้า Dashboard -->
    <div class="fixed top-5 right-5 flex gap-2 z-50">
        <a href="attendance_dashboard.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            DASHBOARD
        </a>
    </div>

    <div class="max-w-md w-full flex flex-col items-center gap-4">
        
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-bold cyber-font text-cyan-400">FAST SCAN</h1>
            <p id="aiStatus" class="text-gray-500 text-[9px] cyber-font uppercase">Loading Systems...</p>
        </div>

        <!-- Scanner View -->
        <div class="scanner-box">
            <video id="video" autoplay playsinline muted></video>
            <div id="scanLine" class="scan-line" style="display: none;"></div>
            <div id="faceFrame" class="face-frame"></div>
            <div id="successOverlay" class="absolute inset-0 bg-green-500/20 hidden z-10"></div>
            
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[85%] glass p-3 text-[10px] cyber-font z-20">
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span id="displayName" class="text-cyan-400 font-bold truncate max-w-[120px]">READY TO SCAN</span>
                            <span id="displayID" class="text-[8px] text-gray-400 uppercase">Wait for Identity</span>
                        </div>
                        <span id="scanPercent" class="text-cyan-400">0%</span>
                    </div>
                    <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden mt-1">
                        <div id="progressBar" class="bg-cyan-400 h-full w-0 transition-all duration-100"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full space-y-3">
            <div class="glass p-4 flex items-center justify-between border-l-4 border-l-cyan-500">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                    <span id="statusText" class="text-[11px] text-yellow-500 uppercase font-bold">Scanning...</span>
                </div>
            </div>

            <button type="button" onclick="openReg()" class="w-full py-3 bg-cyan-500/10 border border-cyan-500/30 rounded-xl flex items-center justify-center gap-2 group hover:bg-cyan-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                <span class="text-xs font-bold text-gray-300">ลงทะเบียนพนักงานใหม่</span>
            </button>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registration-modal" class="hidden fixed inset-0 bg-black/95 z-[100] items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm space-y-5 border-t-2 border-cyan-500 shadow-2xl">
            <h3 class="cyber-font text-sm text-cyan-400 text-center uppercase">New Registration</h3>
            
            <div id="regForm" class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 uppercase mb-1 block">First Name</label>
                    <input type="text" id="regFName" class="w-full bg-white/5 border border-cyan-500/20 p-3 rounded-xl text-white outline-none focus:border-cyan-400" placeholder="ชื่อจริง">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase mb-1 block">Last Name</label>
                    <input type="text" id="regLName" class="w-full bg-white/5 border border-cyan-500/20 p-3 rounded-xl text-white outline-none focus:border-cyan-400" placeholder="นามสกุล">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeReg()" class="flex-1 py-3 bg-gray-800 rounded-xl text-xs font-bold text-gray-300">CANCEL</button>
                    <button type="button" onclick="saveMember()" class="flex-1 py-3 bg-cyan-600 rounded-xl text-xs font-bold text-white uppercase">Start Capture</button>
                </div>
            </div>

            <div id="regProgress" class="hidden text-center py-4">
                <div class="animate-spin w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p id="regText" class="text-[10px] font-bold text-cyan-400 uppercase">Analyzing Face...</p>
                <div class="w-full bg-gray-800 h-1 rounded-full mt-4">
                    <div id="regBar" class="bg-cyan-400 h-full w-0 transition-all"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- เรียกใช้ไฟล์ Logic แยก -->
    <script src="scanner.js"></script>
</body>
</html>
