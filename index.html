<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI Identity Scanner</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-[#05060a] text-white flex items-center justify-center h-screen overflow-hidden">

<!-- Background Glow -->
<div class="absolute w-[600px] h-[600px] bg-cyan-500/20 blur-[150px] rounded-full"></div>

<div class="relative w-full max-w-md space-y-4">

    <!-- HEADER -->
    <div class="text-center">
        <h1 class="text-2xl tracking-widest text-cyan-400 font-bold glow">IDENTITY SCAN</h1>
        <p id="aiStatus" class="text-xs text-gray-400">Initializing Neural Engine...</p>
    </div>

    <!-- SCANNER -->
    <div class="scanner-box">

        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>

        <!-- Animated Frame -->
        <div class="frame"></div>

        <!-- Scan Line -->
        <div class="scan-line"></div>

        <!-- HUD -->
        <div class="hud">
            <div class="flex justify-between">
                <span id="statusText" class="text-yellow-400">Scanning...</span>
                <span id="clock"></span>
            </div>
            <div class="progress">
                <div id="progressBar"></div>
            </div>
        </div>

    </div>

    <!-- BUTTON -->
    <button onclick="registerFace(prompt('ชื่อพนักงาน'))"
        class="btn-neon">
        + REGISTER IDENTITY
    </button>

</div>

<script src="scanner.js"></script>
</body>
</html>
